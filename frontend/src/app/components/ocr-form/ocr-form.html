<!-- src/app/components/ocr-form/ocr-form.html -->

<nav class="navbar">
  <h1>💼 Gestió Despeses</h1>
  <button (click)="tornar()" class="btn btn-secondary">← Tornar</button>
</nav>

<div class="container" style="max-width:650px;">
  <h2 style="font-size:1.5rem; font-weight:700; margin-bottom:1.5rem;">Nova Despesa</h2>

  <!-- ZONA OCR -->
  <div class="card" style="margin-bottom:1.5rem; text-align:center;">
    <p style="color:#94a3b8; margin-bottom:1rem;">
      📷 Puja una foto del tiquet i la IA extraurà les dades automàticament
    </p>

    <input type="file" accept="image/*" (change)="onFitxerSeleccionat($event)"
      style="margin-bottom:1rem; width:auto;">

    @if (imatgePreview) {
      <div style="margin:1rem 0;">
        <img [src]="imatgePreview"
          style="max-width:100%; max-height:200px; border-radius:8px; border:1px solid #2d3148;">
      </div>
    }

    <button (click)="analitzarImatge()"
      [disabled]="!fitxerSeleccionat || loadingOcr"
      class="btn btn-primary" style="margin-top:0.5rem;">
      @if (loadingOcr) { ⏳ Analitzant... } @else { 🤖 Analitzar amb IA }
    </button>
  </div>

  @if (missatge) { <div class="msg-success">{{ missatge }}</div> }
  @if (error) { <div class="msg-error">{{ error }}</div> }

  <!-- FORMULARI -->
  <div class="card">
    <h3 style="font-size:1rem; font-weight:600; color:#94a3b8; margin-bottom:1.25rem;">
      Dades de la despesa
    </h3>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">

      <label style="font-size:0.875rem; color:#94a3b8; grid-column:1/-1;">
        Proveïdor *
        <input [(ngModel)]="despesa.proveidor" name="proveidor" type="text"
          placeholder="Nom de l'empresa" style="margin-top:0.375rem;">
      </label>

      <label style="font-size:0.875rem; color:#94a3b8;">
        CIF
        <input [(ngModel)]="despesa.cif" name="cif" type="text"
          placeholder="B12345678" style="margin-top:0.375rem;">
      </label>

      <label style="font-size:0.875rem; color:#94a3b8;">
        Import Total (€) *
        <input [(ngModel)]="despesa.importTotal" name="importTotal" type="number"
          step="0.01" style="margin-top:0.375rem;">
      </label>

      <label style="font-size:0.875rem; color:#94a3b8;">
        IVA (%)
        <input [(ngModel)]="despesa.iva" name="iva" type="number"
          style="margin-top:0.375rem;">
      </label>

      <label style="font-size:0.875rem; color:#94a3b8;">
        Base Imposable (€)
        <input [(ngModel)]="despesa.baseImposable" name="baseImposable" type="number"
          step="0.01" style="margin-top:0.375rem;">
      </label>

      <label style="font-size:0.875rem; color:#94a3b8;">
        Data *
        <input [(ngModel)]="despesa.data" name="data" type="date"
          (change)="onDataCanvi()"
          style="margin-top:0.375rem;">
        @if (despesa.data && !esDiaLaboral(despesa.data)) {
          <span style="color:#f59e0b; font-size:0.75rem; margin-top:0.25rem; display:block;">
            ⚠️ Cap de setmana
          </span>
        }
      </label>

      <label style="font-size:0.875rem; color:#94a3b8;">
        Categoria
        <select [(ngModel)]="despesa.categoria" name="categoria"
          style="margin-top:0.375rem;">
          @for (cat of categories; track cat) {
            <option [value]="cat">{{ cat }}</option>
          }
        </select>
      </label>

      <label style="font-size:0.875rem; color:#94a3b8; grid-column:1/-1;">
        Concepte *
        <input [(ngModel)]="despesa.concepte" name="concepte" type="text"
          placeholder="Descripció breu" style="margin-top:0.375rem;">
      </label>

    </div>

    <div style="display:flex; justify-content:flex-end; margin-top:1.5rem;">
      <button (click)="guardarDespesa()" [disabled]="loading"
        class="btn btn-success" style="padding:0.75rem 2rem;">
        @if (loading) { ⏳ Guardant... } @else { 💾 Guardar Despesa }
      </button>
    </div>
  </div>
</div>
